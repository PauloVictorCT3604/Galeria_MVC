<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Galeria GG</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0a0a0a;
      --surface: #111;
      --border:  #1e1e1e;
      --neon:    #00ff87;   /* verde neon */
      --neon2:   #00d4ff;   /* ciano */
      --text:    #f5f5f5;
      --muted:   #444;
      --radius:  4px;
      --font:    'Space Grotesk', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
    }

    /* ─── Header ─── */
    header {
      padding: 2rem 2.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }

    .header-left h1 {
      font-size: clamp(1.8rem, 4vw, 3.2rem);
      font-weight: 700;
      letter-spacing: -1px;
      color: var(--text);
    }

    /* underline neon no título */
    .header-left h1 span {
      color: var(--neon);
      text-shadow: 0 0 20px rgba(0,255,135,0.6);
    }

    .header-left p {
      font-size: .72rem;
      color: var(--muted);
      letter-spacing: .12em;
      text-transform: uppercase;
      margin-top: .3rem;
      font-weight: 300;
    }

    /* Badge categoria ativa */
    #current-category {
      font-size: .75rem;
      font-weight: 500;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--neon);
      border: 1px solid rgba(0,255,135,0.3);
      padding: .35rem .9rem;
      border-radius: 2px;
    }

    /* ─── Barra de Busca ─── */
    .search-wrap {
      padding: 1.2rem 2.5rem;
      border-bottom: 1px solid var(--border);
    }

    #search-input {
      width: 100%;
      max-width: 400px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font);
      font-size: .85rem;
      padding: .6rem 1rem;
      outline: none;
      transition: border-color .15s;
    }

    #search-input:focus {
      border-color: var(--neon);
    }

    #search-input::placeholder { color: var(--muted); }

    /* ─── Filtros ─── */
    #filters {
      display: flex;
      gap: .5rem;
      flex-wrap: wrap;
      padding: 1.2rem 2.5rem;
      border-bottom: 1px solid var(--border);
    }

    .filter-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: var(--font);
      font-size: .75rem;
      font-weight: 500;
      letter-spacing: .1em;
      text-transform: uppercase;
      padding: .45rem 1.1rem;
      border-radius: var(--radius);
      cursor: pointer;
      transition: all .15s;
    }

    .filter-btn:hover {
      border-color: var(--neon);
      color: var(--neon);
    }

    /* Ativo: fundo neon sólido, texto preto — máximo contraste */
    .filter-btn.active {
      background: var(--neon);
      border-color: var(--neon);
      color: #000;
      font-weight: 700;
      box-shadow: 0 0 16px rgba(0,255,135,0.4);
    }

    /* ─── Contagem ─── */
    .gallery-meta {
      padding: .7rem 2.5rem;
      font-size: .68rem;
      color: var(--muted);
      letter-spacing: .12em;
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
    }

    /* ─── Galeria — Masonry responsivo ─── */
    #gallery {
      columns: 4 220px;   /* max 4 colunas, mínimo 220px cada */
      gap: 1px;
      padding: 1px;
      background: var(--border);
    }

    /* cada card quebra a coluna individualmente */
    .card {
      break-inside: avoid;
      margin-bottom: 1px;
      display: block;
    }

    #gallery.fade-out {
      opacity: 0;
      transform: translateY(6px);
      transition: opacity .2s, transform .2s;
    }

    #gallery.fade-in {
      animation: fadeUp .28s ease forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ─── Card ─── */
    .card {
      background: var(--surface);
      overflow: hidden;
      animation: cardIn .35s ease both;
      transition: background .2s;
    }

    .card:hover { background: #141414; }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-img-wrap {
      position: relative;
      overflow: hidden;
      aspect-ratio: 3/2;
    }

    .card-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform .45s ease;
      filter: brightness(.9) saturate(.8);
    }

    /* no hover a imagem abre e satura */
    .card:hover .card-img-wrap img {
      transform: scale(1.06);
      filter: brightness(1) saturate(1.1);
    }

    .card-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(10,10,10,.9) 0%, transparent 50%);
      display: flex;
      align-items: flex-end;
      padding: .7rem .9rem;
      opacity: 0;
      transition: opacity .25s;
    }

    .card:hover .card-overlay { opacity: 1; }

    .card-category {
      font-size: .62rem;
      text-transform: uppercase;
      letter-spacing: .14em;
      color: var(--neon);
      font-weight: 500;
    }

    .card-info {
      padding: .85rem 1rem;
      border-top: 1px solid var(--border);
    }

    .card-info h3 {
      font-size: .88rem;
      font-weight: 500;
      margin-bottom: .5rem;
      color: var(--text);
    }

    .card-tags {
      display: flex;
      gap: .3rem;
      flex-wrap: wrap;
    }

    .tag {
      font-size: .6rem;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: .1rem .4rem;
      letter-spacing: .06em;
      text-transform: lowercase;
    }

    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 5rem 2rem;
      color: var(--muted);
    }

    .empty-icon {
      font-size: 2.5rem;
      display: block;
      margin-bottom: 1rem;
    }

    /* ─── Paginação ─── */
    #pagination {
      display: flex;
      justify-content: center;
      gap: .4rem;
      padding: 2rem 2.5rem;
      border-top: 1px solid var(--border);
    }

    .page-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: var(--font);
      font-size: .8rem;
      width: 36px;
      height: 36px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: all .15s;
    }

    .page-btn:hover:not(:disabled) {
      border-color: var(--neon);
      color: var(--neon);
    }

    .page-btn.active {
      background: var(--neon);
      border-color: var(--neon);
      color: #000;
      font-weight: 700;
      box-shadow: 0 0 12px rgba(0,255,135,0.35);
    }

    .page-btn:disabled {
      opacity: .2;
      cursor: not-allowed;
    }

    .nav-btn { font-size: .95rem; }

    /* ─── Footer ─── */
    footer {
      border-top: 1px solid var(--border);
      padding: 1rem 2.5rem;
      font-size: .65rem;
      color: var(--muted);
      letter-spacing: .12em;
      text-transform: uppercase;
      font-weight: 300;
    }
  </style>
</head>
<body>

  <!-- ── HEADER ── -->
  <header>
    <div class="header-left">
      <!-- a letra G em neon dá o toque sem exagero -->
      <h1><span>G</span>ALERIA <span>G</span><span>G</span></h1>
    </div>
    <span id="current-category">✦ TODAS</span>
  </header>

  <!-- ── BUSCA ── -->
  <div class="search-wrap">
    <input type="text" id="search-input" placeholder="Buscar por título ou tag..." />
  </div>

  <!-- ── BOTÕES DE CATEGORIA ── -->
  <nav id="filters" aria-label="Filtrar por categoria"></nav>

  <!-- Contagem de resultados -->
  <div class="gallery-meta">
    <span id="results-count">0 imagens encontradas</span>
  </div>

  <!-- ── GALERIA ── -->
  <main id="gallery"></main>

  <!-- ── PAGINAÇÃO ── -->
  <div id="pagination"></div>

  <!-- Ordem importa: Model → View → Controller → App -->
  <script src="js/model.js"></script>
  <script src="js/view.js"></script>
  <script src="js/controller.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
